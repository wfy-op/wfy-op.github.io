<style>
  :root {
    --wfy-ink: #263238;
    --wfy-muted: #65737e;
    --wfy-line: #d8dee4;
    --wfy-panel: #f7f9fb;
    --wfy-accent: #286a6b;
    --wfy-warm: #8a5a16;
  }

  .profile-hero {
    margin: 0 0 2rem;
    padding: 1.25rem 0 1.5rem;
    border-bottom: 1px solid var(--wfy-line);
  }

  .profile-hero__eyebrow,
  .quick-facts__label,
  .contact-panel__updated {
    color: var(--wfy-muted);
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .profile-hero h1 {
    margin: 0.1rem 0 0.6rem;
    color: var(--wfy-ink);
    font-size: 2.35rem;
    line-height: 1.1;
  }

  .profile-hero__lead {
    max-width: 42rem;
    margin: 0 0 1rem;
    color: #384650;
    font-size: 1.08rem;
    line-height: 1.65;
  }

  .profile-hero__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
  }

  .quick-facts,
  .highlight-grid,
  .recent-work-grid,
  .trajectory-grid,
  .research-media-grid {
    display: grid;
    gap: 0.85rem;
    margin: 1.1rem 0 1.75rem;
  }

  .quick-facts {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .highlight-grid,
  .recent-work-grid,
  .trajectory-grid,
  .research-media-grid {
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  }

  .quick-facts__item,
  .highlight-card,
  .recent-work-card,
  .trajectory-card,
  .research-figure,
  .workstream-panel,
  .contact-panel {
    border: 1px solid var(--wfy-line);
    border-radius: 6px;
    background: #fff;
  }

  .quick-facts__item,
  .highlight-card,
  .recent-work-card,
  .trajectory-card,
  .workstream-panel,
  .contact-panel {
    padding: 0.9rem 1rem;

  .quick-facts__item strong,
  .highlight-card h2,
  .recent-work-card h2,
  .trajectory-card h2 {
    display: block;
    margin: 0.25rem 0 0.35rem;
    color: var(--wfy-ink);

    line-height: 1.35;
  }

    border-top: 3px solid var(--wfy-accent);
  }

  .trajectory-card {
    border-top: 3px solid #56636d;
  }

  .recent-work-card__tag,
  .trajectory-card span {
    color: var(--wfy-warm);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
  }

    display: grid;
    gap: 0.45rem;
    margin: 0.75rem 0 1.5rem;
  }

  .link-list a {
    border-left: 3px solid var(--wfy-accent);
    padding: 0.25rem 0 0.25rem 0.7rem;
    font-weight: 600;
  }

  .contact-panel p + p {
    margin-top: 0.45rem;
  }

  .contact-panel__updated {
    margin-top: 0.8rem !important;
    color: var(--wfy-warm) !important;
  }

  .research-intro {
    margin: 0 0 1.5rem;
    padding: 0.85rem 1rem;
    border-left: 4px solid var(--wfy-accent);
    background: var(--wfy-panel);
    color: #41515c;
  }

  .research-section {
    margin: 2rem 0 2.25rem;
  }

  .research-section > h2 {
    margin-top: 0;
  }

  .research-section__summary {
    max-width: 46rem;
  }

  .research-direction-grid {
    display: grid;
    gap: 1rem;
    margin: 1.2rem 0 2rem;
  }

  .research-direction-card {
    display: grid;
    grid-template-columns: minmax(230px, 0.9fr) minmax(0, 1.1fr);
    overflow: hidden;
    border: 1px solid var(--wfy-line);
    border-radius: 6px;
    background: #fff;
  }

  .research-direction-card__media {
    margin: 0;
    min-height: 210px;
    border-right: 1px solid var(--wfy-line);
    background: var(--wfy-panel);
  }

    width: 100%;
    height: 100%;
    padding: 0.4rem;
    object-fit: contain;
    box-sizing: border-box;
  }

  .research-direction-card__body {
    padding: 1rem 1.1rem;
  }

  .research-direction-card__tag {
    color: var(--wfy-warm);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .research-direction-card__body h2 {
    margin: 0.2rem 0 0.55rem;
    color: var(--wfy-ink);
    font-size: 1.15rem;
    line-height: 1.3;
  }

  .research-direction-card__body p {
    margin: 0 0 0.7rem;
    color: #4c5963;
    line-height: 1.58;
  }

  .research-direction-card__body ul {
    margin: 0 0 0.8rem;
    padding-left: 1.05rem;
    color: #45535d;
    font-size: 0.92rem;
    line-height: 1.5;
  }

    margin: 0 0 1.2rem;
    font-weight: 700;
  }

  .pcsel-companion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 0.9rem;
    margin: 1rem 0 1.8rem;
  }

  .pcsel-stack-card,
  .pcsel-companion-card {
    border: 1px solid var(--wfy-line);
    border-radius: 6px;
    background: #fff;
    padding: 0.95rem 1rem 1.05rem;
  }

  .pcsel-stack-card--primary {
    border-top: 4px solid var(--wfy-accent);
    background: linear-gradient(180deg, #f7fbfb 0%, #fff 62%);
  }

  .pcsel-stack-card__tag {
    color: var(--wfy-warm);
    font-size: 0.76rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .pcsel-stack-card h3,
  .pcsel-companion-card h3 {
    margin: 0.25rem 0 0.55rem;
    color: var(--wfy-ink);
    font-size: 1.05rem;
    line-height: 1.32;
  }

  .pcsel-stack-card p,
  .pcsel-companion-card p {
    margin: 0 0 0.65rem;
    color: #4c5963;
    line-height: 1.56;
  }

    margin: 0.3rem 0 0;
    padding-left: 1.05rem;
    color: #45535d;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .pcsel-agent-panel {
    margin: 2rem 0 2.25rem;
    padding: 1.05rem 1rem 1.15rem;
    border: 1px solid var(--wfy-line);
    border-left: 4px solid var(--wfy-accent);
    border-radius: 6px;
    background: var(--wfy-panel);
  }

  .pcsel-agent-panel h2 {
    margin-top: 0;
  }

  .pcsel-agent-panel__lead {
    max-width: 47rem;
    color: #41515c;
    line-height: 1.62;
  }

    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 0.8rem;
    margin-top: 1rem;

    border: 1px solid #d3dde4;
    border-radius: 6px;
    background: #fff;
    padding: 0.85rem 0.9rem;
  }

  .pcsel-agent-map__item span {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.55rem;
    height: 1.55rem;
    margin-bottom: 0.45rem;
    border-radius: 50%;
    background: var(--wfy-accent);
    color: #fff;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .pcsel-agent-map__item strong {
    display: block;
    margin-bottom: 0.35rem;
    color: var(--wfy-ink);
    line-height: 1.35;
  }

  .pcsel-agent-map__item p {
    margin: 0;
    color: #4c5963;
    font-size: 0.9rem;
    line-height: 1.5;
  }

    margin: 1.4rem 0 1.8rem;
  }

    max-width: 47rem;
    margin-bottom: 1rem;
  }

  .workstream-showcase__eyebrow,
  .workstream-card__tag {
    color: var(--wfy-warm);
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .workstream-showcase__header h3,
  .research-subtitle {
    margin: 0.25rem 0 0.45rem;
    color: var(--wfy-ink);
    font-size: 1.15rem;
    line-height: 1.3;
  }

  .workstream-showcase__header p {
    margin: 0;
    color: #4c5963;
    line-height: 1.58;
  }

  .workstream-detail-grid {
    display: grid;
    gap: 1rem;
    margin: 1rem 0 1.4rem;
  }

  .workstream-card {
    display: grid;
    grid-template-columns: minmax(220px, 0.82fr) minmax(0, 1.18fr);
    gap: 0;
    overflow: hidden;
    border: 1px solid var(--wfy-line);
    border-radius: 6px;
    background: #fff;
  }

  .workstream-card--wide {
    grid-template-columns: minmax(240px, 0.9fr) minmax(0, 1.1fr);
  }

  .workstream-card__media {
    display: flex;
    align-items: stretch;
    margin: 0;
    border-right: 1px solid var(--wfy-line);
    background: var(--wfy-panel);
  }

  .workstream-card__media img {
    display: block;
    width: 100%;
    height: 100%;
    padding: 0.35rem;
    object-fit: contain;
    box-sizing: border-box;
  }

  .workstream-card__body {
    padding: 0.95rem 1rem 1rem;
  }

  .workstream-card__body h4 {
    margin: 0.2rem 0 0.5rem;
    color: var(--wfy-ink);
    font-size: 1.03rem;
    line-height: 1.35;
  }

  .workstream-card__body p {
    margin: 0 0 0.65rem;
    color: #4c5963;
    line-height: 1.55;
  }

  .workstream-card__points {
    margin: 0;
    padding-left: 1.05rem;
    color: #45535d;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .workstream-card__points li + li {
    margin-top: 0.3rem;
  }

  .workstream-panel {
    margin: 1rem 0 1.35rem;
    background: var(--wfy-panel);
  }

  .workstream-panel p {
    margin-top: 0;
  }

  .workstream-panel ul {
    margin-bottom: 0;
  }

  .research-figure {
    margin: 0;
    overflow: hidden;
  }

  .research-figure img {
    display: block;
    width: 100%;
    height: auto;
  }

  .research-figure figcaption {
    padding: 0.65rem 0.75rem;
    border-top: 1px solid var(--wfy-line);
    color: var(--wfy-muted);
    font-size: 0.82rem;
    line-height: 1.45;
  }

  @media (max-width: 720px) {
    .profile-hero h1 {
      font-size: 1.85rem;
    }

    .profile-hero__lead {
      font-size: 1rem;
    }

    .quick-facts {
      grid-template-columns: 1fr;
    }

    .research-direction-card {
      grid-template-columns: 1fr;
    }

    .research-direction-card__media {
      min-height: 180px;
      border-right: 0;
      border-bottom: 1px solid var(--wfy-line);
    }

    .workstream-card,
    .workstream-card--wide {
      grid-template-columns: 1fr;
    }

    .workstream-card__media {
      border-right: 0;
      border-bottom: 1px solid var(--wfy-line);
    }

    .profile-hero__actions .btn {
      width: 100%;
      text-align: center;
    }
  }
</style>
