<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Quantum-well etch-depth risk gate</title>
  <desc id="desc">Schematic stack and decision gate for PCSEL quantum-well etch-depth evaluation.</desc>
  <rect width="640" height="360" fill="#f7f9fb"/>
  <text x="42" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#263238">QW etch-depth risk gate</text>
  <text x="42" y="75" font-family="Arial, sans-serif" font-size="13" fill="#65737e">Screen injection, thermal, and sidewall-recombination risk before process lock-in</text>
  <g transform="translate(60 112)">
    <rect x="0" y="0" width="218" height="38" fill="#dfe8ef" stroke="#c5d0d8"/>
    <rect x="0" y="38" width="218" height="34" fill="#eaf2f2" stroke="#c5d0d8"/>
    <rect x="0" y="72" width="218" height="12" fill="#8a5a16"/>
    <rect x="0" y="84" width="218" height="18" fill="#eaf2f2" stroke="#c5d0d8"/>
    <rect x="0" y="102" width="218" height="12" fill="#8a5a16"/>
    <rect x="0" y="114" width="218" height="48" fill="#dfe8ef" stroke="#c5d0d8"/>
    <path d="M245 -8 V173" stroke="#286a6b" stroke-width="3"/>
    <path d="M235 22 H255 M235 106 H255" stroke="#286a6b" stroke-width="3"/>
    <text x="266" y="28" font-family="Arial, sans-serif" font-size="12" fill="#286a6b">etch front</text>
    <text x="266" y="112" font-family="Arial, sans-serif" font-size="12" fill="#286a6b">QW region</text>
    <text x="18" y="132" font-family="Arial, sans-serif" font-size="12" fill="#384650">active stack</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13">
    <rect x="385" y="112" width="190" height="42" rx="8" fill="#ffffff" stroke="#d8dee4"/>
    <text x="410" y="138" fill="#263238">EC / HT screening</text>
    <path d="M480 154 V180" stroke="#8a5a16" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="385" y="184" width="190" height="42" rx="8" fill="#ffffff" stroke="#d8dee4"/>
    <text x="410" y="210" fill="#263238">PDE / SRH proxy</text>
    <path d="M480 226 V252" stroke="#8a5a16" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="385" y="256" width="190" height="42" rx="8" fill="#ffffff" stroke="#286a6b" stroke-width="2"/>
    <text x="410" y="282" fill="#263238">process window</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8a5a16"/></marker>
  </defs>
</svg>
