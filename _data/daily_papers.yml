  - link: https://link.aps.org/doi/10.1103/PhysRevD.41.3594
    title: Opening the window on strongly interacting dark matter
    authors: Glenn D. Starkman, Andrew Gould, Rahim Esmailzadeh, Savas Dimopoulos
    affiliations: Institute for Advanced Study; University of California, Berkeley; European Organization for Nuclear Research
    abstract: 'We discuss the possibility that the dark matter consists of strongly interacting massive particles (SIMP''s)
      which have cross sections with ordinary matter which are larger than characteristic weak-interaction cross sections.
      We show that, while results from $\ensuremath{\beta}\ensuremath{\beta}$ decay, cosmic-ray detectors, galactic-halo stability,
      the cooling of molecular clouds, proton-decay detectors, and the existence of old neutron stars and the Earth constrain
      the interactions of the missing matter with ordinary matter over a broad range of parameter space, there still exist
      several windows for SIMP''s. It is noteworthy that there are two regions of less than geometric cross sections: one
      with masses of ${10}^{5}$-${10}^{7}$ GeV and another with masses above ${10}^{10}$ GeV.'
    comment: Old but classic paper, make me think about a way from WIMPs to SIMPs 👍.
  - link: http://arxiv.org/abs/2602.15113
    title: The Sun Can Strongly Constrain Spin-Dependent Dark Matter Nucleon Scattering Below the Evaporation Limit
    authors: Thong T. Q. Nguyen, Tim Linden
    affiliations: Stockholm U., OKC; Erlangen - Nuremberg U., ECAP
    abstract: The Sun is a promising target for dark matter (DM) searches due to its ability to accumulate DM particles via
      scattering and catalyze their self-annihilation. However, at low DM masses, DM particles can also "evaporate" due to
      subsequent collisions with the hot thermal plasma of the Sun. While several modeling studies have calculated the competitive
      dynamics of DM evaporation and annihilation, observational studies have typically assumed a fixed 4 GeV "evaporation
      limit", below which DM evaporates before it can annihilate. In this paper, we consider the competitive effects of DM
      evaporation and annihilation on spin-dependent DM nucleon cross-section limits, finding that Solar observations can
      continue to exceed terrestrial constraints by between 1-5 orders of magnitude for DM masses between 2-4 GeV, and can
      even provide world leading constraints below 0.2 GeV where direct detection is limited.
    comment: Old theory but new thoughts, very related to my project 😨 but model-dependent 🤌.
  - link: http://arxiv.org/abs/2602.05955
    title: Improved Heavy Dark Matter Annihilation Search from Dwarf Galaxies with HAWC
    authors: A. Albert, R. Alfaro, C. Alvarez, A. Andrés, E. Anita-Rangel, M. Araya, J. C. Arteaga-Velázquez, D. Avila Rojas,
      H. A. Ayala Solares, R. Babu, P. Bangale, E. Belmont-Moreno, A. Bernal, K. S. Caballero-Mora, T. Capistrán, A. Carramiñana,
      F. Carreón, S. Casanova, A. L. Colmenero-Cesar, U. Cotti, J. Cotzomi, S. Coutiño de León, E. De la Fuente, C. de León,
      P. Desiati, N. Di Lalla, R. Diaz Hernandez, M. A. DuVernois, J. C. Díaz-Vélez, K. Engel, T. Ergin, C. Espinoza, N. Fraija,
      S. Fraija, A. Galván-Gámez, J. A. García-González, F. Garfias, N. Ghosh, A. Gonzalez Muñoz, M. M. González, J. A. González,
      J. A. Goodman, J. Gyeong, J. P. Harding, S. Hernández-Cadena, I. Herzog, D. Huang, F. Hueyotl-Zahuantitla, P. Hüntemeyer,
      A. Iriarte, S. Kaufmann, D. Kieda, K. Leavitt, W. H. Lee, J. Lee, H. León Vargas, J. T. Linnemann, A. L. Longinotti,
      G. Luis-Raya, C. Lundy, K. Malone, O. Martinez, J. Martínez-Castro, H. Martínez-Huerta, J. A. Matthews, P. Miranda-Romagnoli,
      P. E. Mirón-Enriquez, J. A. Morales-Soto, E. Moreno, M. Mostafá, M. Najafi, A. Nayerhoda, L. Nellen, M. U. Nisa, R.
      Noriega-Papaqui, N. Omodei, E. Ponce, Y. Pérez Araujo, E. G. Pérez-Pérez, C. D. Rho, A. Rodriguez Parra, D. Rosa-González,
      M. Roth, H. Salazar, D. Salazar-Gallegos, A. Sandoval, M. Schneider, J. Serna-Franco, M. Shin, A. J. Smith, Y. Son,
      R. W. Springer, O. Tibolla, K. Tollefson, I. Torres, R. Torres-Escobedo, F. Ureña-Mena, E. Varela, L. Villaseñor, X.
      Wang, Z. Wang, I. J. Watson, H. Wu, S. Yu, X. Zhang, H. Zhou
    affiliations: ''
    abstract: Understanding dark matter's elusive nature is crucial for the framework of particle physics and expanding the
      Standard Model. This analysis utilizes the High Altitude Water Cherenkov (HAWC) gamma ray Observatory to indirectly
      search for dark matter (DM) by studying gamma ray emission from dwarf spheroidal galaxies (dSphs). Selected for their
      high ratio of dark matter to baryonic matter, dSphs are useful for this type of search owing to the low background emission.
      In comparison to previous HAWC studies, we significantly improve our sensitivity to DM from dSphs due to improvements
      to our event reconstruction and reduced hadronic contamination. We expanded the number of dSphs studied, DM annihilation
      channels into the Standard Model (SM), and the amount of data collected on each previously studied dSph. We searched
      for DM signals in each dSph using the latest version of the algorithms used to reconstruct data from the primary detector
      of the HAWC instrument. We report that we do not detect evidence of DM from dSphs, so we place upper limits for the
      velocity-weighted DM annihilation cross-section ($\langleσv \rangle$) on the order of $10^{-23}~\text{cm}^3\text{s}^{-1}$
      for a DM mass range of $1-10^4$ TeV.
    comment: New results from HAWC, very impressive and competitive with other indirect detection experiments.