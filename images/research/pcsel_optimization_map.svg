<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">FDTD-driven optimization map</title>
  <desc id="desc">Schematic of treating FDTD-driven PCSEL design as an expensive multi-objective black-box optimization problem.</desc>
  <rect width="640" height="360" fill="#f7f9fb"/>
  <text x="42" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#263238">FDTD-driven optimization</text>
  <text x="42" y="75" font-family="Arial, sans-serif" font-size="13" fill="#65737e">From direct RL framing to constrained multi-objective search</text>
  <g font-family="Arial, sans-serif" font-size="13" fill="#263238">
    <rect x="54" y="126" width="126" height="58" rx="8" fill="#ffffff" stroke="#d8dee4"/>
    <text x="82" y="151">variables</text>
    <text x="73" y="171" font-size="11" fill="#65737e">a, r, slab, DBR</text>
    <path d="M180 155 H235" stroke="#8a5a16" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="236" y="126" width="138" height="58" rx="8" fill="#ffffff" stroke="#d8dee4"/>
    <text x="279" y="151">FDTD</text>
    <text x="260" y="171" font-size="11" fill="#65737e">expensive evaluation</text>
    <path d="M374 155 H429" stroke="#8a5a16" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="430" y="126" width="154" height="58" rx="8" fill="#ffffff" stroke="#d8dee4"/>
    <text x="467" y="151">objectives</text>
    <text x="456" y="171" font-size="11" fill="#65737e">Q, beam, loss, risk</text>
  </g>
  <path d="M506 184 C508 242 396 254 332 240" stroke="#8a5a16" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="190" y="218" width="142" height="62" rx="8" fill="#ffffff" stroke="#286a6b" stroke-width="2"/>
  <text x="226" y="246" font-family="Arial, sans-serif" font-size="13" fill="#263238">surrogate</text>
  <text x="220" y="266" font-family="Arial, sans-serif" font-size="11" fill="#65737e">BO · CMA-ES · Pareto</text>
  <g transform="translate(420 220)">
    <rect x="0" y="0" width="144" height="78" rx="8" fill="#ffffff" stroke="#d8dee4"/>
    <circle cx="34" cy="52" r="4" fill="#286a6b"/><circle cx="54" cy="42" r="4" fill="#286a6b"/><circle cx="72" cy="34" r="4" fill="#286a6b"/><circle cx="94" cy="27" r="4" fill="#8a5a16"/><circle cx="113" cy="23" r="4" fill="#8a5a16"/>
    <path d="M26 58 C50 43 68 34 118 20" stroke="#8a5a16" stroke-width="2" fill="none"/>
    <text x="22" y="18" font-family="Arial, sans-serif" font-size="11" fill="#65737e">Pareto candidates</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8a5a16"/></marker>
  </defs>
</svg>
