<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">PCSEL literature workspace</title>
  <desc id="desc">Schematic of a searchable PCSEL literature workspace with papers, tags, groups, notes, and design links.</desc>
